pipeline:
  name: Build bank of anthos with Sonatype scan
  identifier: Build_vincehinojosa2020_bank_of_anthos_1779969556568
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build and scan
        identifier: Build_and_scan
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Clone repo
                  identifier: clone_repo
                  spec:
                    image: alpine/git:latest
                    shell: Sh
                    command: |-
                      git clone --depth 1 https://github.com/GoogleCloudPlatform/bank-of-anthos.git
                      ls -la bank-of-anthos | head -20
              - step:
                  type: Run
                  name: Apply Java dependency patches
                  identifier: patch_java_deps
                  spec:
                    image: alpine:latest
                    shell: Sh
                    command: |-
                      echo "=== Before patch ==="
                      grep -n "3.5.9" bank-of-anthos/src/ledger/*/pom.xml || echo "(no 3.5.9 found)"
                      echo ""
                      echo "=== Step 1 Upgrade Spring Boot 3.5.9 to 3.5.14 ==="
                      for svc in balancereader ledgerwriter transactionhistory; do
                        sed -i "s|<version>3.5.9</version>|<version>3.5.14</version>|g" bank-of-anthos/src/ledger/$svc/pom.xml
                      done
                      echo ""
                      echo "=== Step 2 Force Tomcat to 10.1.55 ==="
                      for svc in balancereader ledgerwriter transactionhistory; do
                        sed -i 's|<properties>|<properties>\n        <tomcat.version>10.1.55</tomcat.version>|' bank-of-anthos/src/ledger/$svc/pom.xml
                      done
                      echo ""
                      echo "=== After patch — version overrides ==="
                      grep -n "3.5.14\|tomcat.version" bank-of-anthos/src/ledger/*/pom.xml
              - step:
                  type: Run
                  name: Build Java services
                  identifier: build_java
                  spec:
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: |-
                      set -e
                      for svc in balancereader ledgerwriter transactionhistory; do
                        echo "=== Building $svc ==="
                        cd bank-of-anthos/src/ledger/$svc
                        mvn clean package -DskipTests -q
                        cd /harness
                      done
                      echo ""
                      echo "=== Java artifacts produced ==="
                      find bank-of-anthos -name "*.jar" -not -path "*/.m2/*" | grep target
              - step:
                  type: Run
                  name: Install Python services with cryptography upgrade
                  identifier: install_python
                  spec:
                    image: python:3.11-slim
                    shell: Sh
                    command: |-
                      set -e
                      apt-get update && apt-get install -y build-essential
                      pip install --upgrade pip
                      for svc in contacts userservice frontend; do
                        echo "=== Installing $svc ==="
                        if [ -d "bank-of-anthos/src/accounts/$svc" ]; then
                          cd bank-of-anthos/src/accounts/$svc
                        else
                          cd bank-of-anthos/src/$svc
                        fi
                        if [ -f requirements.txt ]; then
                          pip install -r requirements.txt --target ./venv_packages || echo "(continuing on install error)"
                          echo "=== Forcing cryptography upgrade to clear CVE-2026-39892 ==="
                          pip install --upgrade "cryptography>=47.0.0" --target ./venv_packages --upgrade
                          ls ./venv_packages 2>/dev/null | wc -l | xargs -I {} echo "$svc installed packages count {}"
                        fi
                        cd /harness
                      done
              - step:
                  type: Run
                  name: Sonatype Lifecycle scan
                  identifier: sonatype_scan
                  spec:
                    image: eclipse-temurin:17-jdk
                    shell: Sh
                    envVariables:
                      IQ_SERVER_URL: <+secrets.getValue("iq_server_url")>
                      IQ_USERNAME: <+secrets.getValue("iq_username")>
                      IQ_PASSWORD: <+secrets.getValue("iq_password")>
                    command: |-
                      set -ex
                      echo "=== Step started ==="
                      which curl || (apt-get update && apt-get install -y curl)
                      curl -fSL -o nexus-iq-cli.jar https://download.sonatype.com/clm/scanner/latest.jar
                      java -Dhttp.agent="nexus-iq-cli-harness" -jar nexus-iq-cli.jar -i bank-of-anthos__vincehinojosa2020 -s "$IQ_SERVER_URL" -a "$IQ_USERNAME:$IQ_PASSWORD" -t build bank-of-anthos
                      echo "=== Scan complete ==="
